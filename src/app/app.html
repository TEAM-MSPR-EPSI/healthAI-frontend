<!-- Shell: toolbar + sidebar (hidden on login/register) -->
@if (showShell()) {
  <mat-toolbar class="app-toolbar">
    <button mat-icon-button (click)="toggleSidenav()" aria-label="Menu">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="toolbar-title">Administration</span>
    <span class="toolbar-spacer"></span>
    <button mat-icon-button routerLink="/login" aria-label="Déconnexion">
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav
      [mode]="isMobile() ? 'over' : 'side'"
      [opened]="sidenavOpened()"
      (closed)="sidenavOpened.set(false)"
      class="sidenav">

      <app-sidebar
        [menuItems]="menuItems"
        [isMobile]="isMobile()"
        (linkClicked)="toggleSidenav()" />

    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <router-outlet />
    </mat-sidenav-content>
  </mat-sidenav-container>
}

<!-- No-shell: login / register pages -->
@if (!showShell()) {
  <router-outlet />
}
