<div class="recipes-page">
  <!-- Header -->
  <div class="recipes-header">
    <div class="header-left">
      <span class="header-emoji">🌿</span>
      <h1>Recette</h1>
    </div>
    <button class="option-btn">
      <mat-icon>tune</mat-icon> Option
    </button>
  </div>

  <app-recipe-category-carousel [categories]="categories"></app-recipe-category-carousel>

  <!-- CTA Banner -->
  <div class="cta-banner" routerLink="/profile">
    <div class="cta-content">
      <h3>Consulter un nutritionniste</h3>
      <p>Réservez une séance avec un expert</p>
    </div>
    <mat-icon>chevron_right</mat-icon>
  </div>

  <!-- Quick links -->
  <div class="quick-links">
    <a class="quick-link" routerLink="/ingredients">
      <span class="quick-link-icon">❤️</span>
      <span>Recette favorite</span>
      <mat-icon>chevron_right</mat-icon>
    </a>
    <a class="quick-link" routerLink="/sport-programs">
      <span class="quick-link-icon">📋</span>
      <span>Menu journalier</span>
      <mat-icon>chevron_right</mat-icon>
    </a>
  </div>

  <app-recipes-grid [recipes]="dbRecipes" [loading]="loading"></app-recipes-grid>
</div>
