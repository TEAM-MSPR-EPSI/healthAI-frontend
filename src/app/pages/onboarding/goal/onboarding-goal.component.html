<div class="onboarding-page">
  <!-- Progress bar -->
  <div class="progress-top">
    <button class="back-btn" (click)="back()" aria-label="Retour">←</button>
    <div class="progress-bar">
      <div class="progress-step done"></div>
      <div class="progress-step done"></div>
      <div class="progress-step done"></div>
      <div class="progress-step done"></div>
      <div class="progress-step active"></div>
    </div>
    <span class="progress-label">5 / 5</span>
  </div>

  <div class="onboarding-content">
    <h1 class="onboarding-title">Ton objectif principal ?</h1>
    <p class="onboarding-sub">Le programme sportif est facultatif et modifiable plus tard.</p>

    <div class="goal-list">
      @for (goal of goals; track goal.value) {
        <button
          class="goal-option"
          [class.selected]="selectedGoal === goal.value"
          (click)="selectGoal(goal.value)">
          <span class="goal-label">{{ goal.label }}</span>
          <span class="goal-radio">
            @if (selectedGoal === goal.value) {
              <span class="radio-inner"></span>
            }
          </span>
        </button>
      }
    </div>

    <!-- <mat-form-field appearance="outline" class="program-select">
      <mat-label>Programme sportif (facultatif)</mat-label>
      <mat-select [(ngModel)]="selectedProgramId" name="selectedProgramId">
        <mat-option [value]="null">Aucun programme pour le moment</mat-option>
        @for (program of programOptions; track program.sport_program_id) {
          <mat-option [value]="program.sport_program_id">{{ program.sport_program_name }}</mat-option>
        }
      </mat-select>
    </mat-form-field> -->
  </div>

  @if (errorMessage) {
    <p class="error-msg">{{ errorMessage }}</p>
  }

  <div class="onboarding-footer">
    <button class="btn-continuer" (click)="next()" [disabled]="!selectedGoal || saving">
      {{ saving ? 'Sauvegarde...' : 'Terminer →' }}
    </button>
  </div>
</div>
