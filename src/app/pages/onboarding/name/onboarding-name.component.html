<div class="onboarding-page">
  <div class="progress-top">
    <button class="back-btn" (click)="back()" aria-label="Retour">←</button>
    <div class="progress-bar">
      <div class="progress-step done"></div>
      <div class="progress-step active"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
    </div>
    <span class="progress-label">2 / 5</span>
  </div>

  <div class="onboarding-content">
    <img src="logo.png" alt="HealthAI Coach" class="onboarding-logo" />

    <h1 class="onboarding-title">Comment tu t'appelles ?</h1>
    <p class="onboarding-sub">Pour personnaliser ton expérience</p>

    <div class="form-group">
      <label class="form-label" for="firstName">Prénom</label>
      <input
        id="firstName"
        class="form-input"
        type="text"
        placeholder="Lucas"
        [(ngModel)]="firstName"
        autocomplete="given-name"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="lastName">Nom</label>
      <input
        id="lastName"
        class="form-input"
        type="text"
        placeholder="Dupont"
        [(ngModel)]="lastName"
        autocomplete="family-name"
      />
    </div>
  </div>

  @if (errorMessage) {
    <p class="error-msg">{{ errorMessage }}</p>
  }

  <div class="onboarding-footer">
    <button class="btn-continuer" (click)="next()" [disabled]="!firstName.trim() || !lastName.trim() || saving">
      {{ saving ? 'Sauvegarde...' : 'Continuer →' }}
    </button>
  </div>
</div>
