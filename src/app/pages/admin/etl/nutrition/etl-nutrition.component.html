<div class="page-content">
  <button mat-icon-button (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <h1>ETL - Base nutritionnelle</h1>
  
  <div class="cards-grid">
    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>restaurant_menu</mat-icon>
        <mat-card-title>Extraction des données</mat-card-title>
      </mat-card-header>
      <mat-card-actions>
        <button mat-button color="primary">
          <mat-icon>play_arrow</mat-icon>
          Lancer l'extraction
        </button>
        <button mat-button>
          <mat-icon>check_circle</mat-icon>
          Liste valide
        </button>
        <button mat-button>
          <mat-icon>cancel</mat-icon>
          Liste invalide
        </button>
        <button mat-button (click)="toggleLogs()">
          <mat-icon>{{ showLogs ? 'expand_less' : 'expand_more' }}</mat-icon>
          Logs
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  @if (showLogs) {
    <mat-card class="logs-card">
      <mat-card-header>
        <mat-card-title>Historique des logs</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="logs-container">
          @for (log of logs; track $index) {
            <div class="log-line">{{ log }}</div>
          }
          @if (logs.length === 0) {
            <div class="log-line empty">Aucun log pour le moment</div>
          }
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button (click)="clearLogs()">
          <mat-icon>delete</mat-icon>
          Effacer
        </button>
        <button mat-button (click)="toggleLogs()">
          <mat-icon>close</mat-icon>
          Fermer
        </button>
      </mat-card-actions>
    </mat-card>
  }
</div>
