<div class="page-content">
  <h1>Bienvenue, Administrateur</h1>
  <p class="page-description">Accedez rapidement a chaque onglet cle de l'administration HealthAI Coach.</p>

  <div class="cards-grid">
    <a
      *ngFor="let section of importantSections"
      class="admin-card-link"
      [routerLink]="section.route"
      [attr.aria-label]="'Ouvrir ' + section.title"
    >
      <mat-card class="admin-card">
        <mat-card-content class="welcome-card">
          <mat-icon class="welcome-icon">{{ section.icon }}</mat-icon>
          <h2>{{ section.title }}</h2>
          <p>{{ section.description }}</p>
        </mat-card-content>
      </mat-card>
    </a>
  </div>
</div>
