<div class="page-content">
  <h1>Validation des données</h1>
  <p class="page-description">
    Vérifiez la qualité et la cohérence des données avant insertion en base de données.
  </p>

  <div class="cards-grid">
    @for (step of validationSteps; track step.title) {
      <mat-card>
        <mat-card-header>
          <mat-icon mat-card-avatar>{{ step.icon }}</mat-icon>
          <mat-card-title>{{ step.title }}</mat-card-title>
          <mat-card-subtitle>{{ step.description }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <mat-chip-set>
            <mat-chip>{{ step.status }}</mat-chip>
          </mat-chip-set>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button color="primary">
            <mat-icon>play_arrow</mat-icon>
            Lancer la validation
          </button>
          <button mat-button>
            <mat-icon>download</mat-icon>
            Exporter
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</div>
